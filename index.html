<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Random Password Generator</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="password-card">
                <h2>Generate a<br><span class="highlight">random password</span></h2>
                <p>Never use an insecure password again.</p>
                <button class="btn-generate" id="btn-generate">Generate password</button>
                <div class="password-container">
                    <div class="password-display" id="password-display-1"></div>
                    <div class="password-display" id="password-display-2"></div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
