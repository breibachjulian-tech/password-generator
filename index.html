<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Random Password Generator</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="password-card">
                <h2>Generate a<br><span class="highlight">random password</span></h2>
                <p>Never use an insecure password again.</p>
                
                <div class="controls">
                    <div class="control-group">
                        <label for="password-length">Password Length:</label>
                        <input type="number" id="password-length" min="4" max="32" value="12">
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="include-symbols" checked>
                            Include Symbols & Numbers
                        </label>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn-generate" id="btn-generate">Generate password</button>
                    <button class="btn-reset" id="btn-reset">Reset</button>
                </div>
                
                <div class="password-container">
                    <div class="password-box">
                        <div class="password-display" id="password-display-1"></div>
                        <button class="btn-copy" id="btn-copy-1">Copy</button>
                    </div>
                    <div class="password-box">
                        <div class="password-display" id="password-display-2"></div>
                        <button class="btn-copy" id="btn-copy-2">Copy</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
